# Fix user-agent and server
route[RemoveHeader] {
        remove_hf("user-agent");
		remove_hf("P-pwt-in-prefix");
		remove_hf("P-pwt-user-uri");
		remove_hf("P-pwt-src-ip");
		remove_hf("Remote-Party-ID");
		remove_hf("X-FS-Support");
        return;
}

route[outboundModifications] {
	xlog("L_INFO", "--- Enter to OUTBOUNDMODIFICATIONS ROUTE - IP: $si \n");
	#delete display name
	#$fn = $null;

	#uac_replace_from("sip:anon@anon.com", "");


	# ----------------- return call to src IP ---------------- #
	if ($avp(cr_destination) == "return2src" ){
		$ru = "sip:" + $rU + "@" + $hdr(P-pwt-src-ip);
		xlog("L_NOTICE", "--- Return to source IP is Active ---\n");
		xlog("L_INFO", "--- URI was modified to $ru ---\n");
	}

	# ----------------- Change From VINOC ---------------- #
	if ($avp(cr_destination) =~ "vinoc.mx" ){
		uac_replace_from(" ", "sip:8005123422@siplab.piwiit.com");
		xlog("L_NOTICE", "--- Change VINOC from ---\n");
		xlog("L_INFO", "--- URI was modified to $ru ---\n");
	}

	# --------------- Replace TO header to URI --------------- #
	uac_replace_to("VoxTrigger", $ru);

	# ------------- rewrite users in from header ------------- #
	$avp(new_from_domain) = $(avp(new_from){s.select,-1,@});
	$avp(users) = $(avp(new_from){s.select,0,@});

	$avp(new_from_user) = $(avp(users){s.select,0,,});
	$avp(new_from_user2) = $(avp(users){s.select,1,,});


	if ($avp(new_from_user2) != '') {
		$avp(new_from_user) = $avp(new_from_user) + "@" + $avp(new_from_user2);
	}

	#TODO: new route modifications of outbound all

	if ($avp(cr_destination) =~ "@") {
		xlog("L_NOTICE", "Replace From header: $avp(new_from_user)@$avp(new_from_domain)");

		# Construye la URI
		$var(new_from_uri) = "sip:" + $avp(new_from_user) + "@" + $avp(new_from_domain);

		# Usa uac_replace_from con display name vacío
		uac_replace_from($var(new_from_uri), "");
	}

	xlog("L_NOTICE","despues fU: $fU  fd: $fd  rU: $rU -- ru: $ru  -- tu: $tu -- tU: $tU");
	##insert_hf("To: sip:92001525548901373@$rd\r\n", "From"); 

	return;
}

