onreply_route[MAIN_REPLY] {

    route(HANDLE_NAT_REPLY);
    route(MODIFY_Q850_REPLY);
}
route[MODIFY_Q850_REPLY] {

    xlog("incoming reply [MODIFY_Q850_REPLY] $hdr(Reason) -- $rm, $rs, $rr, \n");


    if ($rs == "487" && $rr =~ "^VMDetected Early$") {
        xlog("L_INFO", "Match with VMDetected Early\n");
        remove_hf("Reason");
        append_hf(
            "Reason: SIP;Q.850;cause=50;text=\"VMDETECTED_EARLY\"\r\n"
        );
        xlog("L_INFO", "Q850 Modified\n");
    }
    if ($rs == "487" && $rr =~ "^VMDetected Answer$") {
        xlog("L_INFO", "Match with VMDetected Answer\n");
        remove_hf("Reason");
        append_hf(
            "Reason: SIP;Q.850;cause=53;text=\"VMDETECTED_ANSWER\"\r\n"
        );
        xlog("L_INFO", "Q850 Modified\n");
    }
}


route[HANDLE_NAT_REPLY] {
