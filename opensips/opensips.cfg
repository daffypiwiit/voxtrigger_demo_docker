####### Routing Logic ########

# main request routing logic

route{

	if (!mf_process_maxfwd_header(10)) {
		send_reply(483,"Too Many Hops");
		exit;
	}


	if (has_totag()) {

		# handle hop-by-hop ACK (no routing required)
		if ( is_method("ACK") && t_check_trans() ) {
			t_relay();
			exit;
		}

		# sequential request within a dialog should
		# take the path determined by record-routing
		if ( !loose_route() ) {
			# we do record-routing for all our traffic, so we should not
			# receive any sequential requests without Route hdr.
			send_reply(404,"Not here");
			exit;
		}

		if (is_method("BYE")) {
			# do accounting even if the transaction fails
			do_accounting("log","failed");
		}

		# route it out to whatever destination was set by loose_route()
		# in $du (destination URI).
		route(RemoveHeader);
		route(relay);
		exit;
	}

	# CANCEL processing
	if (is_method("CANCEL")) {
		if (t_check_trans())
			t_relay();
		exit;
	}

	# --- OPTIONS keepalive / health-check ---
    if (is_method("OPTIONS")) {
        sl_send_reply(200, "OK");
        exit;
    }
	

	# absorb retransmissions, but do not create transaction
	t_check_trans();

	/*if ( !(is_method("REGISTER")  ) ) {
		
		if (is_myself("$fd")) {
					
		} else {
			# if caller is not local, then called number must be local
			
			if (!is_myself("$rd")) {
				send_reply(403,"Relay Forbidden");
				exit;
			}
		}

	}*/

	# preloaded route checking
	if (loose_route()) {
		xlog("L_ERR",
			"Attempt to route with preloaded Route's [$fu/$tu/$ru/$ci]");
		if (!is_method("ACK"))
			send_reply(403,"Preload Route denied");
		exit;
	}

	# record routing
	if (!is_method("REGISTER|MESSAGE"))
		record_route();

	# account only INVITEs
	if (is_method("INVITE")) {
		do_accounting("log");
		fix_nated_contact();
		route(INGRESS);
	}

	
	if (!is_myself("$rd")) {
		append_hf("P-hint: outbound\r\n"); 
		
		route(relay);
	}

	# requests for my domain
	
	if (is_method("PUBLISH|SUBSCRIBE")) {
		send_reply(503, "Service Unavailable");
		exit;
	}

	if (is_method("REGISTER")) {
		# store the registration and generate a SIP reply
		if (!save("location"))
			xlog("failed to register AoR $tu\n");

		exit;
	}

	if ($rU==NULL) {
		# request with no Username in RURI
		send_reply(484,"Address Incomplete");
		exit;
	}

	# do lookup with method filtering
	if (!lookup("location","method-filtering")) {
		t_reply(404, "Not Found");
		exit;
	}


	# when routing via usrloc, log the missed calls also
	do_accounting("log","missed");
	route(relay);
}

route[relay] {
	# for INVITEs enable some additional helper routes
	if (is_method("INVITE")) {
		t_on_branch("per_branch_ops");
		t_on_reply("MAIN_REPLY");
		t_on_failure("missed_call");
	}

	if (!t_relay()) {
		send_reply(500,"Internal Error");
	}
	exit;
}



# -------------------  LOGIC START------------------ #

route[INGRESS] {
	xlog("L_NOTICE", "Ingress Route [from: $fu to: $ru]  $si:$sp $socket_in(proto)\n");
	if (!is_method("INVITE")) return;
	
	if (ds_is_in_list($si,$sp)) {
		route(FROM_SERVICE);
	}

	if (!check_address(1, $si, $sp,$socket_in(proto))) {
		xlog("L_ERR", "User not found\n");
		sl_send_reply(403, "Forbidden");
		exit;
	}

	route(FROM_USER);

}

# -------------------- INGRESS ROUTES------------------- #
route[FROM_SERVICE]{
	xlog("L_INFO", "----------------- CALL FROM PIWIIT SERVICE [$ru] ---------------\n");
	if(!is_method("INVITE")) return;
	if (!is_present_hf("P-SERVICE")) {
		xlog("L_DBG", "----------------- REMOVING PROPIETARY HEADERS [$ru] ---------------\n");
		route(RemoveHeader);
		route(TO_CARRIER);
	}
	route(TO_PWT_SERVICE);
}

route[FROM_USER]{
	xlog("L_INFO", "----------------- CALL FROM USER [$ru] ---------------\n");
	if(!is_method("INVITE")) return;
	if ($(rU{s.len}) < 10 || $(rU{s.len}) > 50) {
		xlog("L_ERR", "Destination number length is out of range\n");
		sl_send_reply(404, "Not Found");
		exit;
	}
	# fix_nated_contact();

	$avp(destination_number) = $(rU{s.substr,-10,0});
	$avp(prefix_length) = $(rU{s.len}) - 10;
	$avp(rcv_from) = $si;
	$avp(user_uri) = $rU + "@" + $avp(rcv_from) + ":" + $sp;

	if ($avp(prefix_length) > 0) {
		$avp(in_prefix) = $(rU{s.substr,0,$avp(prefix_length)});
	}
	
	route(TO_PWT_SERVICE);
}

# -------------------- EGRESS ROUTES------------------- #
route[TO_PWT_SERVICE]{
	xlog("L_INFO", "----------------- CALL TO PIWIIT SERVICE [$ru] ---------------\n");
	if(!is_method("INVITE")) return;
	## $avp(in_prefix)=$(hdr(P-EgressRoute)); #NOTE: Verficar si es necesario
	## $rU=$avp(destination_number);#NOTE: envia solo los 10 dig a voxtrigger

	if(!ds_select_dst(101, 4)){
		xlog("L_ERR", "Service Destination NOT found or all servers are Inactive\n");
		send_reply(404, "No destination");
		exit;
	}
	append_hf("P-pwt-in-prefix: $avp(in_prefix)\r\n");
	append_hf("P-pwt-user-uri: $avp(user_uri)\r\n");
	append_hf("P-pwt-src-ip: $avp(rcv_from):$sp\r\n");

	xlog("L_DBG", "--- SCRIPT: going to <$ru> via <$du>\n");
	route(relay);
}


route[TO_CARRIER]{
	xlog("L_INFO", "----------------- CALL TO CARRIER [$ru] [$fU] [$fd] ---------------\n");
	if(!is_method("INVITE")) return;


	### Autenticación
    ##if (!auth_check("$fU", "subscriber", "1")) {
    ##    auth_challenge("$fU", "0");
    ##    exit;
    ##}


	xlog("L_NOTICE","Antes fU: $fU  fd: $fd  rU: $rU -- ru: $ru  -- tu: $tu -- tU: $tU --Display_name: $fn");

	$avp(domain) = "1";
	if (!cr_route("start", $avp(domain), $rU, $rU, "call_id", $avp(cr_destination))) {
		xlog("L_NOTICE","Service not available no gateways found");
		sl_send_reply(404, "Service not available - no gateways found");
		exit;
	}


	# Send to modifications route:
	route(outboundModifications);
	
	xlog("L_NOTICE","New From: $avp(cr_destination) $avp(new_from_user) -- $avp(new_from_user2) -- $avp(new_from_domain) --- $fU y $fd RU: $rU $ru  -- TU: $tu -- $tU");
	##$avp(host) = $rd + ":" + $rp;
	t_on_failure("CARRIER_FAIL_ROUTE");
	route(relay);
}


# ---------------- FAIL ROUTES--------------- #

failure_route[CARRIER_FAIL_ROUTE] {
	xlog("L_INFO", "--- Enter to CARRIER_FAIL_ROUTE IP: $si \n");
	route(RemoveHeader);
	if (t_was_cancelled()) {
		exit;
	}
	revert_uri();
	if (t_check_status("408|[56][09][09]"))  {
		xlog("L_DBG", "--- Choosing Next GW FAIL ROUTE- IP: $si  \n");
		if (!cr_next_domain("start", $avp(domain), $rU,
			$avp(host), $T_reply_code, $avp(domain))) {
			xlog("L_ERR", "cr_next_domain failed\n");
			exit;
		}
		if (!cr_route("start", $avp(domain), $rU, $rU,
			"call_id")) {
			xlog("L_ERR", "cr_route failed\n");
			exit;
		}
	}
	##t_on_failure("CARRIER_FAIL_ROUTE");
	##if (!t_relay()) {
	##	xlog("L_ERR", "t_relay failed\n");
	##	exit;
	##};	
}


